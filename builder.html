<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Конструктор формы</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260421c" />
  <link rel="stylesheet" href="style.css?v=20260421c" />
</head>
<body data-page="builder">
  <div class="container builder-page-shell">
    <div id="builderGate" class="builder-auth card">
      <h1>Конструктор формы</h1>
      <p class="field-hint">Войдите в админ-панель, чтобы редактировать структуру формы, тексты, оформление и ответы.</p>
      <div id="builderAuthModeLabel" class="field-hint builder-auth-mode-label hidden-text"></div>
      <div class="builder-auth-row">
        <input id="builderEmail" type="email" placeholder="Email" class="hidden-text" />
        <input id="builderPasscode" type="password" placeholder="Пароль" />
        <button id="unlockBuilderBtn" type="button">Войти</button>
      </div>
      <div class="builder-auth-links">
        <button id="builderForgotPasswordBtn" type="button" class="button-secondary hidden-text">Восстановить пароль</button>
      </div>
      <div id="builderAuthError" class="error-text hidden-text"></div>
    </div>

    <div id="builderWorkspace" class="hidden-text">
      <div class="builder-page-header">
        <div>
          <h1 id="builderWorkspaceTitle">Мои формы</h1>
          <p id="submitStatus" class="submit-status"></p>
        </div>
        <div class="builder-page-links">
          <button id="saveSchemaBtn" type="button" class="builder-primary-action">Сохранить</button>
          <button id="builderFormsBtn" type="button" class="button-secondary hidden-text">Мои формы</button>
          <a id="builderOpenFormBtn" class="button-secondary hidden-text builder-open-form-link" href="#" target="_blank" rel="noreferrer">Открыть форму</a>
          <button id="closeBuilderBtn" type="button" class="button-secondary builder-close-btn">Выйти</button>
        </div>
      </div>

      <div class="builder-top-tabs">
        <button type="button" class="builder-tab builder-tab-active" data-builder-tab="constructor">Конструктор</button>
        <button type="button" class="builder-tab" data-builder-tab="theme">Тема</button>
        <button type="button" class="builder-tab" data-builder-tab="settings">Настройки</button>
        <button type="button" class="builder-tab" data-builder-tab="permissions">Права</button>
        <button type="button" class="builder-tab" data-builder-tab="responses">Ответы</button>
      </div>

      <div id="builderActions" class="builder-actions card hidden-text" hidden>
        <button id="addTopFieldBtn" type="button">Добавить вопрос</button>
        <button id="resetSchemaBtn" type="button" class="button-secondary">Вернуть исходную форму</button>
        <button id="resetAllDataBtn" type="button" class="button-secondary">Полный сброс данных</button>
      </div>

      <div class="builder-layout">
        <aside id="builderSidebar" class="builder-sidebar card">
          <div class="builder-sidebar-head">
            <div class="builder-sidebar-title">Содержание</div>
            <button id="addFieldFromSidebarBtn" type="button" class="builder-sidebar-add">+</button>
          </div>
          <button id="saveSchemaSidebarBtn" type="button" class="builder-sidebar-save">Сохранить</button>
          <div id="builderOutline" class="builder-outline"></div>
        </aside>
        <div id="builderContent" class="builder-content"></div>
      </div>
    </div>

    <div id="confirmModal" class="modal hidden">
      <div class="modal-content confirm-modal-content">
        <div class="confirm-kicker">Подтверждение</div>
        <h3 id="confirmTitle">Подтвердить действие?</h3>
        <p id="confirmText" class="field-hint">Проверьте действие перед продолжением.</p>
        <div class="confirm-actions">
          <button id="confirmCancelBtn" type="button" class="button-secondary">Отмена</button>
          <button id="confirmSubmitBtn" type="button">Подтвердить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.runtime.js?v=20260421c"></script>
  <script src="config.js?v=20260421c"></script>
  <script src="api.js?v=20260421c"></script>
  <script src="app.js?v=20260421c"></script>
</body>
</html>
